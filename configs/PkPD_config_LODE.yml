model:
  type: "LatentSDE"
  latent_dim: &latentdim 32
  context_dim: 32

  obs_encoder:
    type: "Recurrent_Encoder"
    hidden_size: 32

  SDE:
    drift:
      type: "MLP"
      hidden_size: 32
      depth: 1
      activation: swish
    drift_aug:
      type: "MLP"
      hidden_size: 32
      depth: 1
      activation: swish
    diffusion:
      type: "SparseMLP_ODE"
      activation: sigmoid
    solver: EM()
    kwargs:
        dt: 0.1

  obs_decoder:
    type: "MLP_Decoder"
    hidden_size: 32
    depth: 1
    dist: "Poisson"


training:
  learning_rate: 0.01
  optimizer: AdamW(0.01) 
  epochs: 200
  log_freq: 10
  viz_freq: 10
  stop_patience: 20
  lr_decay:
    type: "exponential"
    gamma: 0.95  # Decay factor per epoch (0.95 means 95% of previous value)
    step_every: 10  # Apply decay every epoch
  validation:
      latent_dim: *latentdim  
      solver: EM()
      mcmc_samples: 25
      kwargs:
          dt: 0.1

experiment:
  name: "LatentSDE_PKPD_V0"
  description: "First experiment with a Latent SDE model using Rhythm on the PKPD model"
  path: "experiments/" 

