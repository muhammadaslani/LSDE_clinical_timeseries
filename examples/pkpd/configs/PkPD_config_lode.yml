model:
  type: "LatentODE"
  latent_dim: &latentdim 32
  context_dim: 32

  obs_encoder:
    type: "Recurrent_Encoder"
    hidden_size: 32

  ODE:
    vector_field:
      type: "MLP"
      hidden_size: 32
      depth: 1
      activation: swish
    solver: Euler()
    kwargs:
        dt: 0.1

  obs_decoder:
    type: "MultiHeadLinearDecoder"
    dists: ["Classification", "Poisson"]


training:
  learning_rate: 0.002
  optimizer: AdamW(0.002) 
  epochs: 200
  log_freq: 10
  viz_freq: 1
  stop_patience: 20
  lr_decay:
    type: "exponential"
    gamma: 0.9  # Decay factor per epoch (0.95 means 95% of previous value)
    step_every: 50  # Apply decay every epoch
  validation:
      latent_dim: *latentdim
      solver: Euler()
      mcmc_samples: 50
      kwargs:
          dt: 0.1

experiment:
  name: "LatentODE_PKPD_V0"
  description: "First experiment with a Latent ODE model using Rhythm on the PKPD model"
  path: "experiments/" 

