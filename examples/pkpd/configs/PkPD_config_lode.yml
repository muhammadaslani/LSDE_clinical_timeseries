model:
  type: "LatentODE"
  latent_dim: &latentdim 8
  context_dim: 8

  obs_encoder:
    type: "Recurrent_Encoder"
    hidden_size: 8

  ODE:
    vector_field:
      type: "MLP"
      hidden_size: 16
      depth: 2
      activation: swish
    solver: Euler()
    kwargs:
        dt: 0.5

  obs_decoder:
    type: "BranchDecoder"
    hidden_size: 32
    depth: 2
    dists: ["Classification", "Poisson"]


training:
  learning_rate: 0.005
  optimizer: AdamW(0.005) 
  epochs: 20
  log_freq: 1
  viz_freq: 1
  stop_patience: 20
  lr_decay:
    type: "exponential"
    gamma: 0.9  # Decay factor per epoch (0.95 means 95% of previous value)
    step_every: 50  # Apply decay every epoch
  validation:
      latent_dim: *latentdim
      solver: Euler()
      mcmc_samples: 5
      kwargs:
          dt: 0.5

experiment:
  name: "LatentODE_PKPD_V0"
  description: "First experiment with a Latent ODE model using Rhythm on the PKPD model"
  path: "experiments/" 

