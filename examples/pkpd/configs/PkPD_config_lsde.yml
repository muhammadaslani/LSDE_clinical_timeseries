model:
  type: "LatentSDE"
  latent_dim: &latentdim 64
  context_dim: 128

  obs_encoder:
    type: "Recurrent_Encoder"
    hidden_size: 128

  SDE:
    drift:
      type: "MLP"
      hidden_size: 64
      depth: 1
      activation: swish
    drift_aug:
      type: "MLP"
      hidden_size: 64
      depth: 1
      activation: swish
    diffusion:
      type: "SparseMLP"
      activation: sigmoid
    solver: SOSRI()
    kwargs:
        dt: 0.01

  obs_decoder:
    type: "MultiHeadLinearDecoder"
    dists: ["Classification", "Poisson"]


training:
  learning_rate: 0.002
  optimizer: AdamW(0.002) 
  epochs: 100
  log_freq: 10
  viz_freq: 10
  stop_patience: 20
  lr_decay:
    type: "exponential"
    gamma: 0.9  # Decay factor per epoch (0.95 means 95% of previous value)
    step_every: 50  # Apply decay every epoch
  validation:
      latent_dim: *latentdim  
      solver: SOSRI()
      mcmc_samples: 50
      kwargs:
          dt: 0.01
experiment:
  name: "LatentSDE_PKPD_V0"
  description: "First experiment with a Latent SDE model using Rhythm on the PKPD model"
  path: "experiments/" 
