model:
  type: "LatentCDE"

  CDE:
    vector_field:
      type: "CDEField"
      hidden_size: 32
      depth: 1
      activation: swish
    solver: Tsit5()
    kwargs:
      dt: 0.01

  validation:
    solver: Tsit5()
    kwargs:
      dt: 0.01

experiment:
  name: "LatentCDE_PKPD_V0"
  description: "Latent CDE model for PKPD forecasting"
  path: "experiments/"
