model:
  type: "RNN"
  latent_dim: &latentdim 64

  obs_encoder:
    type: "Recurrent_Encoder"
    hidden_size: 64

  obs_decoder:
    type: "BranchDecoder"
    hidden_size: 64
    depth: 2
    dists: ["Classification", "Poisson"]


training:
  learning_rate: 0.005
  optimizer: AdamW(0.005) 
  epochs: 200
  log_freq: 10
  viz_freq: 10
  stop_patience: 20
  lr_decay:
    type: "exponential"
    gamma: 0.9  # Decay factor per epoch (0.95 means 95% of previous value)
    step_every: 50  # Apply decay every epoch
  validation:


experiment:
  name: "RNN_PKPD_Forecasting_V0"
  description: "First experiment with a RNN model using Rhythm on the PKPD dataset"
  path: "experiments/"
