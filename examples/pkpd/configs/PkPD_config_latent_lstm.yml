model:
  type: "LatentLSTM"
  latent_dim: 64
  context_dim: 128

  obs_encoder: 
    type: "Recurrent_Encoder"
    hidden_size: 128

  dynamics:
    type: "LSTM"
    hidden_size: 64
    depth: 1

  obs_decoder:
    type: "MultiHeadLinearDecoder"
    dists: ["Classification", "Poisson"]


training:
  learning_rate: 0.002
  optimizer: AdamW(0.002) 
  epochs: 300
  log_freq: 10
  viz_freq: 10
  stop_patience: 20
  lr_decay:
    type: "exponential"
    gamma: 0.9  # Decay factor per epoch (0.95 means 95% of previous value)
    step_every: 50  # Apply decay every epoch
  validation:
    mcmc_samples: 50


experiment:
  name: "latent LSTM PKPD_Forecasting_V0"
  description: "First experiment with a latent LSTM model using Rhythm on the PKPD dataset"
  path: "experiments/"
