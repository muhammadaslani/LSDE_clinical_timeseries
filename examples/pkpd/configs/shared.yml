# Shared hyperparameters for all PKPD forecasting models.
# These values are merged into each model config at load time.
# Model-specific configs can override any of these.

shared:
  model:
    latent_dim: 8
    context_dim: 64

    obs_encoder:
      type: "Recurrent_Encoder"
      hidden_size: 64

    obs_decoder:
      type: "MultiHeadLinearDecoder"
      dists: ["Classification", "Poisson"]

  training:
    learning_rate: 0.002
    optimizer: AdamW()
    epochs: 200
    log_freq: 10
    viz_freq: 10
    stop_patience: 10
    batch_size: 32
    lr_decay:
      type: "exponential"
      gamma: 0.9
      step_every: 100
    validation:
      mcmc_samples: 100
