model:
  type: "LatentSDE"
  context_dim: 32

  SDE:
    drift:
      type: "MLP"
      hidden_size: 16
      depth: 1
      activation: swish
    drift_aug:
      type: "MLP"
      hidden_size: 16
      depth: 1
      activation: swish
    diffusion:
      type: "DiffusionMLP"
      hidden_size: 16
      depth: 1
      activation: sigmoid
    solver: EM()
    kwargs:
      dt: 0.02

  validation:
    solver: EM()
    kwargs:
      dt: 0.02

experiment:
  name: "LatentSDE_Glucose_V0"
  description: "Latent SDE model for Bergman glucose forecasting"
  path: "experiments/"
