model:
  type: "LatentSDE"

  SDE:
    drift:
      type: "MLP"
      hidden_size: 32
      depth: 1
      activation: swish
    drift_aug:
      type: "MLP"
      hidden_size: 32
      depth: 1
      activation: swish
    diffusion:
      type: "SparseMLP"
      activation: sigmoid
    solver: LambaEM()
    kwargs:
      dt: 0.01

  validation:
    solver: LambaEM()
    kwargs:
      dt: 0.01

experiment:
  name: "LatentSDE_ICU_V0"
  description: "Latent SDE model for ICU forecasting"
  path: "experiments/"
