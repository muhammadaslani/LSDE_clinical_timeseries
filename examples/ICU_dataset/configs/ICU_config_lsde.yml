model:
  type: "LatentSDE"
  latent_dim: &latentdim 64
  context_dim: 256

  obs_encoder:
    type: "Recurrent_Encoder"
    hidden_size: 64

  SDE:
    drift:
      type: "MLP"
      hidden_size: 64
      depth: 1
      activation: swish
    drift_aug:
      type: "MLP"
      hidden_size: 64
      depth: 1
      activation: swish
    diffusion:
      type: "MLP"
      hidden_size: 64
      depth: 1
      activation: sigmoid  
    solver: EM()
    kwargs:
        dt: 0.01

  obs_decoder:
    type: "MultiHeadLinearDecoder"
    dists: ["Gaussian", "Gaussian", "Gaussian"]


training:
  learning_rate: 2e-3
  optimizer: AdamW(2e-3)
  epochs: 200
  log_freq: 10
  viz_freq: 10
  stop_patience: 20
  lr_decay:
    type: "exponential"
    gamma: 0.9  # Decay factor per epoch (0.95 means 95% of previous value)
    step_every: 50  # Apply decay every epoch
  validation:
      latent_dim: *latentdim  
      solver: EM()
      mcmc_samples: 50
      kwargs:
          dt: 0.01

experiment:
  name: "LatentSDE_ICU_Sys_ID_V0"
  description: "First experiment with a Latent SDE model using Rhythm on the ICU dataset"
  path: "experiments/" 
