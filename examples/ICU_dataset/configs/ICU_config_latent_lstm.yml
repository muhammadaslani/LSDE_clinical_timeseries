model:
  type: "LatentLSTM"
  latent_dim: 64
  context_dim: 256

  obs_encoder: 
    type: "Recurrent_Encoder"
    hidden_size: 64

  dynamics:
    type: "LSTM"
    hidden_size: 64
    depth: 1

  obs_decoder:
    type: "MultiHeadLinearDecoder"
    dists: ["Gaussian", "Gaussian", "Gaussian"]


training:
  learning_rate: 2e-3
  optimizer: AdamW(2e-3)
  epochs: 200
  log_freq: 10
  viz_freq: 10
  stop_patience: 20
  lr_decay:
    type: "exponential"
    gamma: 0.9  # Decay factor per epoch (0.95 means 95% of previous value)
    step_every: 50  # Apply decay every epoch
  validation:
    mcmc_samples: 100


experiment:
  name: "latent LSTM ICU_Forecasting_V0"
  description: "First experiment with a latent LSTM model using Rhythm on the ICU dataset"
  path: "experiments/"
